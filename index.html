<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght=400;700&display=swap');
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; overflow-y: auto; -webkit-tap-highlight-color: transparent; }
        @media (min-width: 768px) { body { overflow: hidden; } }
        .canvas-container { position: relative; width: 100%; height: 45vh; background: #000; border: 1px solid #334155; border-radius: 8px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); flex-shrink: 0; }
        @media (min-width: 768px) { .canvas-container { height: 56vh; } }
        canvas { display: block; width: 100%; height: 100%; }
        .neon-text { text-shadow: 0 0 5px rgba(52, 211, 153, 0.5); }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-ble { background-color: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
        .status-disconnected { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #10b981; cursor: pointer; margin-top: -7px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="min-h-screen md:h-screen flex flex-col p-2 md:p-4">

    <header class="flex flex-wrap justify-between items-center mb-3 md:mb-4 gap-2 bg-slate-800/40 p-3 rounded-lg border border-slate-700/50">
        <div class="flex items-center space-x-3">
            <h1 class="text-lg md:text-2xl font-bold neon-text text-emerald-400 truncate">我测</h1>
            <div id="connectionStatus" class="flex items-center text-xs md:text-sm bg-slate-900/60 px-2 py-1 rounded">
                <span class="status-dot status-disconnected" id="statusDot"></span>
                <span id="statusText" class="text-slate-400">DISCONNECTED</span>
            </div>
        </div>
        
        <div class="flex items-center space-x-2 md:space-x-4">
            <div class="text-center bg-slate-900/80 px-2.5 py-1 rounded border border-slate-700">
                <div class="text-[10px] text-slate-500">COUNT</div>
                <div class="text-lg md:text-xl font-bold text-emerald-400 font-mono" id="blinkCount">0 TIMES</div>
            </div>
            <div class="text-center bg-slate-900/80 px-2.5 py-1 rounded border border-slate-700 min-w-[100px]">
                <div class="text-[10px] text-slate-500">FREQ</div>
                <div class="text-sm md:text-lg font-bold text-blue-400 font-mono pt-0.5" id="blinkRate">WAITING</div>
            </div>
            <div class="text-center bg-slate-900/80 px-2 py-1 rounded border border-slate-700 min-w-[85px]">
                <div class="text-[10px] text-slate-500">RESULT</div>
                <div class="text-xs font-bold pt-0.5 text-slate-400" id="diagnosisResult">INACTIVE</div>
            </div>
            
            <button onclick="toggleBluetooth()" id="btnBle" class="bg-blue-600 active:bg-blue-800 hover:bg-blue-700 text-white px-3 py-2 rounded text-xs md:text-sm font-bold transition shadow-lg">
                <span id="txtBle">CONNECT</span>
            </button>
        </div>
    </header>

    <div class="canvas-container mb-3 md:mb-4">
        <canvas id="oscilloscope"></canvas>
        <div class="absolute top-2 right-2 text-right bg-black/70 p-2 rounded backdrop-blur-sm border border-slate-700 pointer-events-none z-10 font-mono">
            <div class="text-[10px] text-slate-400">AMPLIFY</div>
            <div class="text-lg md:text-xl font-bold text-emerald-400" id="valVoltage">0.00 V</div>
            <div class="text-[10px] text-slate-500">ADC: <span id="valAdc">0</span></div>
        </div>
        <div id="pauseOverlay" class="hidden absolute inset-0 bg-black/40 backdrop-blur-[1px] flex items-center justify-center pointer-events-none z-20">
            <div class="bg-slate-900/90 px-6 py-3 rounded-lg border border-emerald-500/50 text-emerald-400 font-bold tracking-widest text-sm shadow-2xl">|| STOP</div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 md:h-24">
        <div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700 flex items-center justify-between gap-4">
            <div class="flex-1 flex items-center space-x-2">
                <span class="text-xs text-slate-400 whitespace-nowrap">SCALE</span>
                <input type="range" min="1" max="15" step="0.5" value="3" class="flex-1" id="scaleX" oninput="updateSettings()">
            </div>
            <div class="flex items-center space-x-2 bg-slate-900/40 p-2 rounded border border-slate-700/60">
                <label for="pauseToggle" class="text-xs text-slate-300 cursor-pointer select-none">FREEZE</label>
                <input type="checkbox" id="pauseToggle" class="w-4 h-4 accent-emerald-500 cursor-pointer" onchange="togglePauseMode()"/>
            </div>
        </div>
        
        <div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700 flex items-center justify-around gap-2">
            <button onclick="exportToCSV()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 active:from-emerald-700 text-white font-bold text-sm py-4 rounded-lg border border-emerald-700 shadow-lg hover:from-emerald-500 hover:to-teal-500 transition-all duration-200">
                EXPORT CSV
            </button>
        </div>
    </div>

    <script>
        let globalConfig = { adcMax: 4095, sysVoltage: 3.3, scaleX: 3 };
        const CANVAS_BG = '#000000', GRID_COLOR = '#1e293b', LINE_COLOR = '#10b981', MAX_HISTORY_POINTS = 36000; 
        let dataBuffer = [], incomingBuffer = "", isConnected = false, isPaused = false;
        let bleDevice = null, bleCharacteristic = null; const textDecoder = new TextDecoder();
        
        let lastReceivedBlinkCount = 0;
        let lastReceivedStatusId = 0;

        const canvas = document.getElementById('oscilloscope'), ctx = canvas.getContext('2d');
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1, rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr; canvas.height = rect.height * dpr; ctx.scale(dpr, dpr);
            canvas.logicalWidth = rect.width; canvas.logicalHeight = rect.height;
        }
        window.addEventListener('resize', resizeCanvas); setTimeout(resizeCanvas, 100);

        function updateSettings() { globalConfig.scaleX = parseFloat(document.getElementById('scaleX').value) || 3; }
        
        function formatDateToBeijingStr(dateObj) {
            const hrs = String(dateObj.getHours()).padStart(2, '0');
            const mins = String(dateObj.getMinutes()).padStart(2, '0');
            const secs = String(dateObj.getSeconds()).padStart(2, '0');
            const ms = String(dateObj.getMilliseconds()).padStart(3, '0');
            return `${hrs}:${mins}:${secs}.${ms}`;
        }

        function formatTimeShort(dateObj) {
            const hrs = String(dateObj.getHours()).padStart(2, '0');
            const mins = String(dateObj.getMinutes()).padStart(2, '0');
            const secs = String(dateObj.getSeconds()).padStart(2, '0');
            return `${hrs}:${mins}:${secs}`;
        }

        function exportToCSV() {
            if (dataBuffer.length === 0) {
                alert("NO DATA");
                return;
            }
            
            let csvLines = ["time,voltage"];
            let baseTimestamp = dataBuffer[0].rawTimestamp; 
            
            dataBuffer.forEach((item, index) => {
                let interpolatedMs = baseTimestamp + (index * 10); 
                let interpolatedDate = new Date(interpolatedMs);
                let smoothTimeStr = formatDateToBeijingStr(interpolatedDate);
                csvLines.push(`${smoothTimeStr},${item.voltage.toFixed(3)}`);
            });
            
            const csvBlob = new Blob([csvLines.join("\n")], { type: "text/csv;charset=utf-8;" });
            const blobUrl = URL.createObjectURL(csvBlob);
            
            const link = document.createElement("a");
            link.setAttribute("href", blobUrl);
            const fileTime = new Date().toISOString().slice(0,10);
            link.setAttribute("download", `All_Blink_WaveData_${fileTime}.csv`);
            document.body.appendChild(link);
            
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
        }

        function handleIncomingData(chunk) {
            if (isPaused) return;
            incomingBuffer += chunk;
            if (incomingBuffer.length > 8000) { incomingBuffer = ""; return; }
            let parts = incomingBuffer.split('\n'); incomingBuffer = parts.pop(); 
            
            parts.forEach(part => {
                const tokens = part.trim().split(',');
                
                if (tokens.length === 5 && tokens[0] === "D") {
                    const adcRawVal = parseInt(tokens[1]); 
                    const blinkCount = parseInt(tokens[2]);
                    const bpmValue = parseInt(tokens[3]);
                    const statusId = parseInt(tokens[4]);

                    if (!isNaN(adcRawVal)) {
                        if (blinkCount < lastReceivedBlinkCount || (statusId === 0 && (lastReceivedStatusId === 1 || lastReceivedStatusId === 2))) {
                            console.log("RESET");
                            dataBuffer = []; 
                        }
                        
                        lastReceivedBlinkCount = blinkCount;
                        lastReceivedStatusId = statusId;

                        const currentVoltage = (adcRawVal / globalConfig.adcMax) * globalConfig.sysVoltage;
                        const nowObj = new Date();

                        document.getElementById('valVoltage').innerText = currentVoltage.toFixed(2) + " V";
                        document.getElementById('valAdc').innerText = adcRawVal;
                        
                        dataBuffer.push({ 
                            val: adcRawVal, 
                            rawTimestamp: nowObj.getTime(), 
                            voltage: currentVoltage,
                            statusId: statusId 
                        });
                        if (dataBuffer.length > MAX_HISTORY_POINTS) dataBuffer.shift();

                        document.getElementById('blinkCount').innerText = blinkCount + " TIMES";
                        
                        const rateUI = document.getElementById('blinkRate'), diagUI = document.getElementById('diagnosisResult');
                        if (statusId === 0) {
                            rateUI.innerText = "ALIGNING..."; rateUI.className = "text-xs text-slate-400 font-mono";
                            diagUI.innerText = "WAITING"; diagUI.className = "text-xs font-bold pt-0.5 text-slate-500";
                        } else {
                            rateUI.innerText = `${bpmValue} BPM`; rateUI.className = "text-lg font-bold text-blue-400 font-mono";
                            if (statusId === 2) { 
                                diagUI.innerText = "DRY EYE"; diagUI.className = "text-xs font-bold pt-0.5 text-red-500"; 
                            } else { 
                                diagUI.innerText = "NORMAL"; diagUI.className = "text-xs font-bold pt-0.5 text-emerald-400"; 
                            }
                        }
                    }
                }
            });
        }

        function draw() {
            requestAnimationFrame(draw); const w = canvas.logicalWidth, h = canvas.logicalHeight;
            ctx.fillStyle = CANVAS_BG; ctx.fillRect(0, 0, w, h);
            
            const maxP = Math.floor(w / (globalConfig.scaleX * 0.15));
            const viewData = dataBuffer.slice(-maxP);
            
            drawGridWithTime(w, h, viewData);
            
            if (viewData.length === 0) return;
            
            ctx.beginPath(); ctx.strokeStyle = LINE_COLOR; ctx.lineWidth = 2.5;
            const step = w / (viewData.length - 1 || 1);
            for (let i = 0; i < viewData.length; i++) {
                const x = i * step, y = h * (1 - (viewData[i].val / globalConfig.adcMax)) * 0.9 + (h * 0.05);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawGridWithTime(w, h, viewData) {
            ctx.lineWidth = 1;
            for (let i = 1; i <= 3; i++) {
                const y = h * (i / 4);
                ctx.strokeStyle = GRID_COLOR; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            }
            
            const gridDivisions = 4;
            for (let i = 0; i <= gridDivisions; i++) {
                const x = w * (i / gridDivisions);
                ctx.strokeStyle = GRID_COLOR; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
                
                if (viewData.length > 0) {
                    let dataIdx = Math.floor((viewData.length - 1) * (i / gridDivisions));
                    if (dataIdx >= 0 && dataIdx < viewData.length) {
                        let pointDate = new Date(viewData[dataIdx].rawTimestamp);
                        let timeLabel = formatTimeShort(pointDate);
                        
                        ctx.fillStyle = '#64748b'; ctx.font = '10px JetBrains Mono';
                        if (i === 0) ctx.fillText(timeLabel, x + 4, h - 6);
                        else if (i === gridDivisions) ctx.fillText(timeLabel, x - 54, h - 6);
                        else ctx.fillText(timeLabel, x - 25, h - 6);
                    }
                }
            }
        }

        async function toggleBluetooth() { if (isConnected && bleDevice?.gatt.connected) bleDevice.gatt.disconnect(); else connectBluetooth(); }
        async function connectBluetooth() {
            if (!navigator.bluetooth) return alert("Web Bluetooth is not supported in this environment. Please use Chrome or Edge browser.");
            try {
                bleDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [0xffe0] });
                bleDevice.addEventListener('gattserverdisconnected', () => { isConnected = false; updateStatusUI('disconnected'); });
                const server = await bleDevice.gatt.connect(), service = await server.getPrimaryService(0xffe0);
                bleCharacteristic = await service.getCharacteristic(0xffe2); 
                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', (e) => handleIncomingData(textDecoder.decode(e.target.value)));
                isConnected = true; updateStatusUI('ble');
                dataBuffer = []; 
            } catch (err) { console.error(err); isConnected = false; }
        }
        function togglePauseMode() { isPaused = document.getElementById('pauseToggle').checked; document.getElementById('pauseOverlay').classList.toggle('hidden', !isPaused); }
        function updateStatusUI(status) {
            const dot = document.getElementById('statusDot'), text = document.getElementById('statusText'), btn = document.getElementById('btnBle');
            if (status === 'ble') { dot.className = 'status-dot status-ble'; text.innerText = 'SYNCING'; btn.innerText = "DISCONNECT"; } 
            else { dot.className = 'status-dot status-disconnected'; text.innerText = 'OFFLINE'; btn.innerText = "CONNECT"; }
        }
        draw();
    </script>
</body>
</html>
