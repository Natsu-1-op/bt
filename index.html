<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            overflow-y: auto; 
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 768px) {
            body { overflow: hidden; }
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 45vh; 
            background: #000;
            border: 1px solid #334155;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
            flex-shrink: 0;
        }

        @media (min-width: 768px) {
            .canvas-container { height: 60vh; }
        }

        canvas { display: block; width: 100%; height: 100%; }
        .neon-text { text-shadow: 0 0 5px rgba(52, 211, 153, 0.5); }

        .status-dot {
            height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px;
        }
        .status-ble { background-color: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
        .status-disconnected { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
            background: #10b981; cursor: pointer; margin-top: -7px; 
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen md:h-screen flex flex-col p-2 md:p-4">

    <header class="flex flex-wrap justify-between items-center mb-3 md:mb-4 gap-2 bg-slate-800/40 p-3 rounded-lg border border-slate-700/50">
        <div class="flex items-center space-x-4">
            <h1 class="text-lg md:text-2xl font-bold neon-text text-emerald-400 truncate">我测</h1>
            <div id="connectionStatus" class="flex items-center text-xs md:text-sm bg-slate-900/60 px-2 py-1 rounded">
                <span class="status-dot status-disconnected" id="statusDot"></span>
                <span id="statusText" class="text-slate-400">设备离线</span>
            </div>
        </div>
        
        <div class="flex items-center space-x-3 md:space-x-6">
            <div class="text-center bg-slate-900/80 px-3 py-1 rounded border border-slate-700">
                <div class="text-[10px] text-slate-500">有效眨眼计数</div>
                <div class="text-xl md:text-2xl font-bold text-emerald-400 font-mono" id="blinkCount">0 次</div>
            </div>
            <div class="text-center bg-slate-900/80 px-3 py-1 rounded border border-slate-700">
                <div class="text-[10px] text-slate-500">眨眼频率 (BPM)</div>
                <div class="text-xl md:text-2xl font-bold text-blue-400 font-mono" id="blinkRate">等待数据...</div>
            </div>
            <div class="text-center bg-slate-900/80 px-3 py-1 rounded border border-slate-700min-w-[120px]">
                <div class="text-[10px] text-slate-500">干眼症评估结果</div>
                <div class="text-xs md:text-sm font-bold pt-1 text-slate-400" id="diagnosisResult">未激活诊断</div>
            </div>
            
            <button onclick="toggleBluetooth()" id="btnBle" class="bg-blue-600 active:bg-blue-800 hover:bg-blue-700 text-white px-4 py-2 rounded text-xs md:text-sm font-bold transition flex items-center gap-1 shadow-lg shadow-blue-900/20">
                <span id="txtBle">连接蓝牙外设</span>
            </button>
        </div>
    </header>

    <div class="canvas-container mb-3 md:mb-4">
        <canvas id="oscilloscope"></canvas>
        
        <div class="absolute top-2 right-2 text-right bg-black/70 p-2 rounded backdrop-blur-sm border border-slate-700 pointer-events-none z-10 font-mono">
            <div class="text-[10px] text-slate-400">当前电压 / 采样值</div>
            <div class="text-lg md:text-xl font-bold text-emerald-400" id="valVoltage">0.00 V</div>
            <div class="text-[10px] text-slate-500">ADC: <span id="valAdc">0</span></div>
        </div>

        <div id="pauseOverlay" class="hidden absolute inset-0 bg-black/40 backdrop-blur-[1px] flex items-center justify-center pointer-events-none z-20">
            <div class="bg-slate-900/90 px-6 py-3 rounded-lg border border-emerald-500/50 text-emerald-400 font-bold tracking-widest text-sm md:text-base shadow-2xl">
                || 核心采样流已挂起 (暂停状态)
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 md:h-24">
        
        <div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700 flex flex-wrap items-center justify-between gap-2">
            <div class="flex items-center space-x-3">
                <div>
                    <label class="text-[11px] text-slate-400 block mb-0.5">高电平触发阈值 (V)</label>
                    <input type="number" id="cfgThreshold" value="2.00" step="0.05" min="0" max="3.3" class="w-20 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm font-bold font-mono text-emerald-400 text-center focus:border-emerald-500 outline-none" onchange="updateSettings()">
                </div>
                <div>
                    <label class="text-[11px] text-slate-400 block mb-0.5">干眼症判定阈值 (BPM)</label>
                    <input type="number" id="cfgDryThreshold" value="25" step="1" min="1" max="100" class="w-20 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm font-bold font-mono text-red-400 text-center focus:border-red-500 outline-none" onchange="updateSettings()">
                </div>
            </div>
            <div class="text-[10px] text-slate-500 max-w-[140px]">提示：正常的静息眨眼频率通常为 15-20 次/分钟。</div>
        </div>

        <div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700 flex items-center justify-between gap-4">
            <div class="flex-1 flex items-center space-x-2">
                <span class="text-xs text-slate-400 whitespace-nowrap">时间轴缩放</span>
                <span class="text-[10px] text-slate-500">密</span>
                <input type="range" min="1" max="15" step="0.5" value="3" class="flex-1 animate-pulse" id="scaleX" oninput="updateSettings()">
                <span class="text-[10px] text-slate-500">疏</span>
            </div>
            <div class="flex items-center space-x-2 bg-slate-900/40 p-2 rounded border border-slate-700/60">
                <label for="pauseToggle" class="text-xs text-slate-300 cursor-pointer select-none">数据流冻结</label>
                <input type="checkbox" id="pauseToggle" class="w-4 h-4 accent-emerald-500 cursor-pointer" onchange="togglePauseMode()"/>
            </div>
        </div>

        <div class="bg-slate-800/40 p-3 rounded-lg border border-slate-700 flex items-center justify-around gap-2">
            <button onclick="exportCSV()" class="flex-1 bg-gradient-to-r from-blue-900/60 to-indigo-900/60 active:from-blue-800 active:to-indigo-800 text-blue-200 font-bold text-xs py-3 rounded-lg border border-blue-700 shadow-md transition-all">
                导出历史数据 (CSV)
            </button>
            <button onclick="resetMetrics()" class="bg-slate-700 hover:bg-slate-600 active:bg-slate-800 text-slate-300 text-xs px-3 py-3 rounded-lg border border-slate-600">
                重置计数
            </button>
        </div>
    </div>

    <script>
        // === 全局业务与硬件映射配置 ===
        let globalConfig = {
            adcMax: 4095,
            sysVoltage: 3.3,
            scaleX: 3,
            voltageThreshold: 2.0,  // 触发检测的高电平电压阈值
            dryEyeBpmThreshold: 25  // 判定为干眼症的 BPM 频率阈值
        };

        const CANVAS_BG = '#000000';
        const GRID_COLOR = '#1e293b';
        const LINE_COLOR = '#10b981';
        const THRESHOLD_LINE_COLOR = '#ef4444'; // 阈值参考线颜色
        const MAX_HISTORY_POINTS = 3000;

        let dataBuffer = [];      // 包含 { val: adc值, time: Date对象, tsText: 格式化时间文本 }
        let incomingBuffer = "";
        let isConnected = false;
        let isPaused = false;
        
        // === 眨眼核心核心状态算法机 ===
        let isHighLevelState = false; // 当前硬件是否处于高电平状态包络中
        let binksTimestamps = [];     // 存储每次第一个高电平跳变发生的绝对时间戳（毫秒）
        let systemStartTime = null;   // 数据流开始接收后的系统对齐零点时间

        // === 蓝牙核心底层句柄 ===
        let bleDevice = null;
        let bleCharacteristic = null;
        const textDecoder = new TextDecoder();

        const canvas = document.getElementById('oscilloscope');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.logicalWidth = rect.width;
            canvas.logicalHeight = rect.height;
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);
        updateSettings();

        function updateSettings() {
            globalConfig.scaleX = parseFloat(document.getElementById('scaleX').value) || 3;
            globalConfig.voltageThreshold = parseFloat(document.getElementById('cfgThreshold').value) || 2.0;
            globalConfig.dryEyeBpmThreshold = parseFloat(document.getElementById('cfgDryThreshold').value) || 25;
        }

        function adcToPhys(adcVal) {
            return (adcVal / globalConfig.adcMax) * globalConfig.sysVoltage;
        }

        // 格式化系统时间戳（包含毫秒，用于横轴高精度渲染）
        function formatSystemTime(dateObj) {
            const pad = (n) => String(n).padStart(2, '0');
            const h = pad(dateObj.getHours());
            const m = pad(dateObj.getMinutes());
            const s = pad(dateObj.getSeconds());
            const ms = String(dateObj.getMilliseconds()).padStart(3, '0').substring(0, 1);
            return `${h}:${m}:${s}.${ms}`;
        }

        // === 信号处理与突变检测状态机 ===
        function processRealtimeSignal(adcRawVal) {
            const currentVoltage = adcToPhys(adcRawVal);
            
            // 首次接受到有效硬件点数据时，锚定系统计算基准零点
            if (!systemStartTime) {
                systemStartTime = Date.now();
            }

            // 边缘触发检测核心状态转换
            if (currentVoltage >= globalConfig.voltageThreshold) {
                if (!isHighLevelState) {
                    // 【突变锁定】：瞬间由低电平跳变到第一个高电平点
                    isHighLevelState = true; 
                    registerValidBlink();
                }
                // 如果已经在高电平状态内，则属于后续由于眨眼动作产生的包络或震荡，直接忽略不计入计数
            } else {
                // 回落到阈值下方，释放状态锁，允许接受下一次波形的上升沿触发
                if (isHighLevelState) {
                    isHighLevelState = false;
                }
            }
        }

        // 注册一次合法的眨眼信号点
        function registerValidBlink() {
            const now = Date.now();
            binksTimestamps.push(now);
            
            document.getElementById('blinkCount').innerText = binksTimestamps.length + " 次";
            
            // 播放界面数值瞬时跳变反馈特效
            const blinkCountUI = document.getElementById('blinkCount');
            blinkCountUI.classList.add('scale-110', 'text-yellow-400');
            setTimeout(() => blinkCountUI.classList.remove('scale-110', 'text-yellow-400'), 150);

            evalBlinkFrequency();
        }

        // 实时更新眨眼频率及评估干眼症
        function evalBlinkFrequency() {
            if (!systemStartTime) return;
            
            const elapsedSeconds = (Date.now() - systemStartTime) / 1000;
            const blinkRateUI = document.getElementById('blinkRate');
            const diagnosisUI = document.getElementById('diagnosisResult');

            if (elapsedSeconds < 40) {
                // 首次检测 40 秒内，进行锁屏倒计时提示
                const remaining = Math.ceil(40 - elapsedSeconds);
                blinkRateUI.innerText = `数据积累中(${remaining}s)`;
                blinkRateUI.className = "text-xs text-slate-500 font-mono";
                diagnosisUI.innerText = "等待窗口对齐";
                diagnosisUI.className = "text-xs font-bold pt-1 text-slate-500";
                return;
            }

            // 后续逻辑：滑动时间窗口实时追踪近 40 秒内眨眼包数量
            const cutoffTime = Date.now() - 40000;
            const validBlinksInWindow = binksTimestamps.filter(ts => ts >= cutoffTime).length;
            
            // 将 40 秒内的计数值等比换算归一化为每分钟频率 (BPM)
            // 公式： $$BPM = \frac{\text{validBlinksInWindow}}{40} \times 60$$
            const bpm = Math.round((validBlinksInWindow / 40) * 60);
            
            blinkRateUI.innerText = `${bpm} BPM`;
            blinkRateUI.className = "text-xl md:text-2xl font-bold text-blue-400 font-mono";

            // 业务评估栏：判断是否大于用户设定的诊断干眼症阈值
            if (bpm > globalConfig.dryEyeBpmThreshold) {
                diagnosisUI.innerText = "⚠️ 疑似干眼症症状";
                diagnosisUI.className = "text-xs font-bold pt-1 text-red-500 animate-bounce";
            } else {
                diagnosisUI.innerText = "指标正常";
                diagnosisUI.className = "text-xs font-bold pt-1 text-emerald-400";
            }
        }

        // 每秒自动触发刷新，确保在用户不眨眼时，频率也能随着时间窗口向后滑动而实时归零更新
        setInterval(evalBlinkFrequency, 1000);

        function resetMetrics() {
            binksTimestamps = [];
            systemStartTime = Date.now();
            document.getElementById('blinkCount').innerText = "0 次";
            document.getElementById('blinkRate').innerText = "重置中...";
            document.getElementById('diagnosisResult').innerText = "未激活诊断";
            document.getElementById('diagnosisResult').className = "text-xs font-bold pt-1 text-slate-400";
        }

        // === 核心数据流绘图机 ===
        function draw() {
            requestAnimationFrame(draw);
            if (dataBuffer.length === 0) {
                ctx.fillStyle = CANVAS_BG;
                ctx.fillRect(0, 0, canvas.logicalWidth, canvas.logicalHeight);
                drawGrid(canvas.logicalWidth, canvas.logicalHeight, []);
                return;
            }

            const width = canvas.logicalWidth;
            const height = canvas.logicalHeight;

            ctx.fillStyle = CANVAS_BG;
            ctx.fillRect(0, 0, width, height);

            // 根据缩放因子，动态计算屏幕可以容纳展现的硬件序列点数
            const maxPointsToShow = Math.floor(width / (globalConfig.scaleX * 0.4));
            const viewData = dataBuffer.slice(-maxPointsToShow);

            drawGrid(width, height, viewData);

            // 绘制当前高电平触发阈值的红色警戒参考线
            const thresholdY = height * (1 - (globalConfig.voltageThreshold / globalConfig.sysVoltage));
            ctx.strokeStyle = THRESHOLD_LINE_COLOR;
            ctx.lineWidth = 1;
            ctx.setLineDash([6, 3]);
            ctx.beginPath();
            ctx.moveTo(0, thresholdY);
            ctx.lineTo(width, thresholdY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = THRESHOLD_LINE_COLOR;
            ctx.font = '10px sans-serif';
            ctx.fillText(`检测阈值: ${globalConfig.voltageThreshold.toFixed(2)}V`, width - 90, thresholdY - 4);

            // 渲染时序波形路径
            ctx.beginPath();
            ctx.strokeStyle = LINE_COLOR;
            ctx.lineWidth = 2.5;

            const step = width / (viewData.length - 1 || 1);

            for (let i = 0; i < viewData.length; i++) {
                const x = i * step;
                const physVal = adcToPhys(viewData[i].val);
                const normalizedY = physVal / globalConfig.sysVoltage;
                const y = height * (1 - normalizedY);

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawGrid(w, h, viewData) {
            // Y 轴多级电压梯度刻度线
            for (let i = 0; i <= 4; i++) {
                const ratio = i / 4;
                const y = h * (1 - ratio);
                const val = ratio * globalConfig.sysVoltage;

                ctx.lineWidth = i === 0 ? 1.5 : 1;
                ctx.strokeStyle = i === 0 ? '#475569' : GRID_COLOR;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
                
                ctx.fillStyle = '#64748b';
                ctx.font = '10px JetBrains Mono';
                ctx.fillText(`${val.toFixed(1)}V`, 5, y - 4);
            }

            // X 轴时间映射线转换：均匀采样抽头提取当前波段所对应的具体系统时间戳
            if (viewData.length > 1) {
                ctx.strokeStyle = GRID_COLOR;
                ctx.lineWidth = 1;
                ctx.fillStyle = '#475569';
                ctx.font = '9px JetBrains Mono';

                const totalTicks = 5; 
                const stepIdx = Math.floor(viewData.length / totalTicks);

                for (let i = 1; i < totalTicks; i++) {
                    const dataIdx = i * stepIdx;
                    if (dataIdx >= viewData.length) break;
                    
                    const step = w / (viewData.length - 1);
                    const x = dataIdx * step;

                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, h);
                    ctx.stroke();

                    // 呈现当前帧采样点绑定的系统真实时间标签
                    ctx.fillText(viewData[dataIdx].tsText, x - 20, h - 6);
                }
            }
        }

        // === 数据管道底层总线输入驱动 ===
        function handleIncomingData(chunk) {
            if (isPaused) return;

            incomingBuffer += chunk;
            if (incomingBuffer.length > 5000) { incomingBuffer = ""; return; }
            
            let parts = incomingBuffer.split('\n');
            incomingBuffer = parts.pop(); 

            const now = new Date();
            const formattedTime = formatSystemTime(now);

            parts.forEach(part => {
                const cleanStr = part.trim();
                if (cleanStr.length > 0) {
                    const val = parseInt(cleanStr);
                    if (!isNaN(val) && val >= 0 && val <= 65535) {
                        // 1. 同步送入突变检测状态机
                        processRealtimeSignal(val);

                        // 2. 存入波形环形历史回放缓冲区
                        dataBuffer.push({ val: val, time: now, tsText: formattedTime });
                        if (dataBuffer.length > MAX_HISTORY_POINTS) {
                            dataBuffer.shift();
                        }
                    }
                }
            });
        }

        // === 蓝牙链路行为管理器 ===
        async function toggleBluetooth() {
            if (isConnected && bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
            } else {
                connectBluetooth();
            }
        }

        async function connectBluetooth() {
            if (!navigator.bluetooth) {
                alert("当前环境或浏览器不支持 Web Bluetooth API，请确保部署在 HTTPS 环境下并使用支持的浏览器（如 Chrome）。");
                return;
            }
            try {
                // 默认监听通用串口透传 FFE0 服务
                bleDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [0xffe0]
                });

                bleDevice.addEventListener('gattserverdisconnected', () => {
                    isConnected = false;
                    updateStatusUI('disconnected');
                    resetMetrics();
                });

                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(0xffe0);
                bleCharacteristic = await service.getCharacteristic(0xffe2); // 接收数据特征
                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const chunk = textDecoder.decode(e.target.value);
                    handleIncomingData(chunk);
                });

                isConnected = true;
                updateStatusUI('ble');
                systemStartTime = Date.now(); // 挂载零点
            } catch (error) {
                console.error(error);
                isConnected = false;
                updateStatusUI('disconnected');
            }
        }

        function togglePauseMode() {
            isPaused = document.getElementById('pauseToggle').checked;
            document.getElementById('pauseOverlay').classList.toggle('hidden', !isPaused);
        }

        function exportCSV() {
            if (dataBuffer.length === 0) return alert("无可供导出的历史采样快照。");
            let csvContent = "data:text/csv;charset=utf-8,系统时间轴,原始采样(ADC),物理等效电压(V)\n";
            dataBuffer.forEach(item => {
                csvContent += `${item.tsText},${item.val},${adcToPhys(item.val).toFixed(4)}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.href = encodedUri;
            link.download = `blink_raw_dataset_${new Date().getTime()}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function updateStatusUI(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btn = document.getElementById('btnBle');
            dot.className = 'status-dot ';
            if (status === 'ble') {
                dot.classList.add('status-ble'); text.innerText = 'BLE 连接在线'; text.className="text-blue-400 font-bold";
                btn.className = "bg-red-600 active:bg-red-800 hover:bg-red-700 text-white px-4 py-2 rounded text-xs md:text-sm font-bold transition";
                document.getElementById('txtBle').innerText = "切断物理连接";
            } else {
                dot.classList.add('status-disconnected'); text.innerText = '设备离线'; text.className="text-slate-400";
                btn.className = "bg-blue-600 active:bg-blue-800 hover:bg-blue-700 text-white px-4 py-2 rounded text-xs md:text-sm font-bold transition";
                document.getElementById('txtBle').innerText = "连接蓝牙外设";
            }
        }
        
        draw();
    </script>
</body>
</html>
